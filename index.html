<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8"> 
    <title> Rock Paper Scissors Referee</title>
    <link rel="stylesheet" href="stylesheet.css">

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

</head>

<body>
    <h1>Rock Paper Scissors</h1>
    
    <button id="start-btn" onclick="startCamera()">Start Camera</button>
    
    <button id="play-btn" onclick="startRound()" disabled>Play Round</button>
    
    <button onclick="resetScores()">Reset</button>

    <p id="status">Ready</p>
    <div id="webcam-container"></div>

    <div id="countdown"></div>

    <div id="gesture-row">

        <div class="gesture-box">

            <div class="gesture-label">You</div>

            <div id="gesture">-</div>

        </div>
        <div class="gesture-box">
            <div class="gesture-label">Computer</div>
            <div id="computer-gesture">-</div>
        </div>
    </div>
<div id="scores">

        <div>Player<span id="p1">0</span></div>
        <div>Computer <span id="p2">0</span></div>

</div>

<div id="result">-</div>
<script src="script.js"></script>

</body>
</html>
